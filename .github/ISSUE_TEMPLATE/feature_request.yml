name: Feature request
description: Suggest a new tool, transport option, or improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please check the
        [ROADMAP](../blob/main/docs/ROADMAP.md) and existing issues first — your
        idea may already be planned or under discussion.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and why is it hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? A new tool, config flag, transport option, doc, …?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why they fall short.
    validations:
      required: false
  - type: checkboxes
    id: security-aware
    attributes:
      label: Security awareness
      options:
        - label: >-
            I've considered whether this touches the security boundary (path
            containment, frontmatter allowlist, HTTP auth, OAuth, two-step
            writes) and noted it above if so.
          required: false
