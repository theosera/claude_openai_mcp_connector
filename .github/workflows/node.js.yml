name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Least privilege: the default GITHUB_TOKEN is read-only. Elevate per-job only
# where a job actually needs write access (none does here).
permissions:
  contents: read

# Cancel superseded runs on the same branch / PR to cut race + cost surface.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    # Test the engines floor (22.x = latest 22 line) and the EXACT pinned dev/
    # runtime version (24.13.0, see .node-version). The pinned leg is exact, not
    # a 24.x range: setup-node resolves ranges to whatever 24.y.z the runner has
    # cached, which would not actually exercise the version we pinned. fail-fast
    # off so one leg's failure does not mask the other's result.
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.13.0]

    steps:
      # Actions are pinned to a full 40-char commit SHA (+ trailing version
      # comment) so a re-tagged release can't swap the code under us. Dependabot
      # (.github/dependabot.yml) bumps the SHA + comment together; do not revert
      # these pins to floating tags.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
        # pnpm version is auto-detected from the package.json "packageManager" field.

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Dependency audit (advisory, non-blocking)
        # Supply-chain advisory. `pnpm audit` exits non-zero when it finds
        # advisories; keep it visible as a CI warning but non-blocking (real
        # triage happens in the Dependabot PR). continue-on-error surfaces the
        # result without failing the build.
        continue-on-error: true
        run: pnpm audit --audit-level moderate

      # oxlint first: a fast (Rust) correctness pass that fails the build in
      # milliseconds before the heavier ESLint / type / build / test steps.
      - run: pnpm run lint:ox
      - run: pnpm run format:check
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run build
      - run: pnpm test
